<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generic Job Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-weight: bold;
    }
    input,
    textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 12px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Job Application Form</h1>
  <form id="application-form">
    <div class="form-group">
      <label for="first_name">First Name</label>
      <input id="first_name" name="first_name" type="text" placeholder="Enter your first name" />
    </div>

    <div class="form-group">
      <label for="last_name">Last Name</label>
      <input id="last_name" name="last_name" type="text" placeholder="Enter your last name" />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" placeholder="your.email@example.com" />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" type="tel" placeholder="+1 (555) 123-4567" />
    </div>

    <div class="form-group">
      <label for="linkedin_url">LinkedIn Profile</label>
      <input id="linkedin_url" name="linkedin_url" type="url" placeholder="https://linkedin.com/in/yourprofile" />
    </div>

    <div class="form-group">
      <label for="github_url">GitHub Profile</label>
      <input id="github_url" name="github_url" type="url" placeholder="https://github.com/yourprofile" />
    </div>

    <button type="submit">Submit Application</button>
  </form>
</body>
</html>
