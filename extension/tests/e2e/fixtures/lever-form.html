<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lever Application Form</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
      margin: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      font-size: 13px;
    }
    input {
      padding: 11px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .required {
      color: #d9534f;
    }
    button {
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-top: 10px;
      transition: transform 0.1s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Apply to our team</h1>
    <form id="lever-form">
      <div class="field-group">
        <label for="name">
          Full Name <span class="required">*</span>
        </label>
        <input id="name" name="name" type="text" required />
      </div>

      <div class="field-group">
        <label for="email">
          Email <span class="required">*</span>
        </label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field-group">
        <label for="phone">
          Phone <span class="required">*</span>
        </label>
        <input id="phone" name="phone" type="tel" required />
      </div>

      <div class="field-group">
        <label for="linkedin">LinkedIn Profile</label>
        <input id="linkedin" name="urls[LinkedIn]" type="url" placeholder="https://linkedin.com/in/yourprofile" />
      </div>

      <div class="field-group">
        <label for="github">GitHub Profile</label>
        <input id="github" name="urls[GitHub]" type="url" placeholder="https://github.com/yourprofile" />
      </div>

      <div class="field-group">
        <label for="portfolio">Portfolio / Website</label>
        <input id="portfolio" name="portfolio" type="url" placeholder="https://yourportfolio.com" />
      </div>

      <button type="submit">Apply Now</button>
    </form>
  </div>
</body>
</html>
