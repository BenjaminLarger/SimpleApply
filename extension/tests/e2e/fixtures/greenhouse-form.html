<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenhouse Application Form</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f9f9f9;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .application-form {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    .form-field {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    input:focus,
    textarea:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
    }
    .required::after {
      content: ' *';
      color: #d9534f;
    }
    button {
      padding: 12px 24px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    button:hover {
      background: #27ae60;
    }
  </style>
</head>
<body>
  <div class="application-form">
    <h1>Apply Now</h1>
    <form id="greenhouse-form">
      <div class="form-field">
        <label for="first_name" class="required">First Name</label>
        <input id="first_name" name="first_name" type="text" />
      </div>

      <div class="form-field">
        <label for="last_name" class="required">Last Name</label>
        <input id="last_name" name="last_name" type="text" />
      </div>

      <div class="form-field">
        <label for="email" class="required">Email</label>
        <input id="email" name="email" type="email" />
      </div>

      <div class="form-field">
        <label for="phone" class="required">Phone</label>
        <input id="phone" name="phone" type="tel" />
      </div>

      <div class="form-field">
        <label for="linkedin_profile">LinkedIn Profile</label>
        <input id="linkedin_profile" name="linkedin_profile" type="url" />
      </div>

      <div class="form-field">
        <label for="github_profile">GitHub Profile</label>
        <input id="github_profile" name="github_profile" type="url" />
      </div>

      <div class="form-field">
        <label for="resume_url">Resume / CV</label>
        <input id="resume_url" name="resume_url" type="url" />
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
